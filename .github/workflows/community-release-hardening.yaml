# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Community Release Hardening

on:
  pull_request:
  push:
    branches:
      - 'main'

jobs:
  fast-release-package:
    name: Fast release package checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'package.json'
      - name: Run deterministic advanced-flow verifier
        run: node examples/community-e2e/run-demo.mjs
      - name: Validate PR-050 release hardening package
        run: node hack/pr050-validate-release-hardening.mjs

  release-gates:
    name: Full release gates and live demo
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:18.4-alpine3.23
        env:
          POSTGRES_USER: local
          POSTGRES_PASSWORD: local
          POSTGRES_DB: distr
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://local:local@localhost:5432/distr?sslmode=disable
      JWT_SECRET: bG9jYWwtand0LXNlY3JldC1wbGFjZWhvbGRlci0zMi1ieXRlcw==
      DISTR_HOST: http://localhost:8080
      USER_EMAIL_VERIFICATION_REQUIRED: 'false'
      DISTR_EXPERIMENTAL_FEATURE_FLAGS: environments,lifecycles,channels,release_bundles,deployment_processes,scoped_variables_v2,deployment_plans,task_queue,agent_capabilities,agent_task_leases,step_events,deployment_timeline,config_as_code
      DISTR_TARGET_ID: 95a53f00-a01e-414e-98fd-9e1cbf3553d9
      DISTR_TARGET_SECRET: local
      DISTR_LOGIN_ENDPOINT: http://localhost:8080/api/v1/agent/login
      DISTR_MANIFEST_ENDPOINT: http://localhost:8080/api/v1/agent/manifest
      DISTR_RESOURCE_ENDPOINT: http://localhost:8080/api/v1/agent/resources
      DISTR_STATUS_ENDPOINT: http://localhost:8080/api/v1/agent/status
      DISTR_METRICS_ENDPOINT: http://localhost:8080/api/v1/agent/metrics
      DISTR_LOGS_ENDPOINT: http://localhost:8080/api/v1/agent/logs
      DISTR_AGENT_LOGS_ENDPOINT: http://localhost:8080/api/v1/agent/deployment-target-logs
      DISTR_INTERVAL: 5s
      DISTR_REGISTRY_HOST: localhost:8585
      DISTR_DEMO_DISPOSABLE_HUB: 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          check-latest: true
          cache-dependency-path: |
            go.sum
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'package.json'
          cache: pnpm
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint with prettier
        run: pnpm run lint
      - name: Validate migrations
        run: hack/validate-migrations.sh
      - name: Run Go tests
        env:
          DISTR_TEST_DATABASE_URL: postgres://local:local@localhost:5432/distr?sslmode=disable
        run: go test -p=1 ./...
      - name: Run Go static analysis
        run: go vet ./...
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: 'v2.12.2' # renovate: datasource=github-releases depName=golangci/golangci-lint
          args: --config=.golangci.release.yml ./...
      - name: Run Angular tests
        run: pnpm run test
      - name: Build community frontend
        run: pnpm run build:community
      - name: Build community Hub
        run: go build -o dist/distr-amd64 ./cmd/hub
      - name: Build Docker agent
        run: go build -o dist/docker-agent ./cmd/agent/docker
      - name: Build Kubernetes agent
        run: go build -o dist/kubernetes-agent ./cmd/agent/kubernetes
      - name: Start Hub and run live community demo
        shell: bash
        run: |
          dist/distr-amd64 serve &
          node examples/community-e2e/live-demo.mjs --require-running-hub
      - name: Run Go vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: Run production dependency audit
        run: pnpm audit --prod
      - name: Run dependency license scan
        run: node hack/pr050-license-scan.mjs
      - name: Run PR-050 release package validation
        run: node hack/pr050-validate-release-hardening.mjs
