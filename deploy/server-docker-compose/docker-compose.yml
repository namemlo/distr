name: ${COMPOSE_PROJECT_NAME:-distr-prod}

services:
  postgres:
    image: postgres:18.4-alpine3.23
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
    volumes:
      - postgres:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  storage:
    image: rustfs/rustfs:1.0.0-beta.4
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:?set RUSTFS_ACCESS_KEY in .env}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:?set RUSTFS_SECRET_KEY in .env}
    volumes:
      - rustfs:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'sh', '-c', 'curl -fsS http://127.0.0.1:9000/health >/dev/null']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  migrate:
    image: ${DISTR_IMAGE_REF:?set DISTR_IMAGE_REF in .env}
    command: ['migrate']
    env_file:
      - ${DISTR_COMPOSE_ENV_FILE:?deploy.sh supplies the absolute env file}
    depends_on:
      postgres:
        condition: service_healthy
      storage:
        condition: service_healthy
    profiles:
      - migrate

  timestamp-operator:
    image: ${DISTR_IMAGE_REF:?set DISTR_IMAGE_REF in .env}
    command: ['external-execution-timestamps', '--help']
    env_file:
      - ${DISTR_COMPOSE_ENV_FILE:?deploy.sh supplies the absolute env file}
    environment:
      PGAPPNAME: distr-timestamp-operator
    volumes:
      - ${DISTR_TIMESTAMP_EVIDENCE_DIR:-./timestamp-evidence}:/evidence
    depends_on:
      postgres:
        condition: service_healthy
      storage:
        condition: service_healthy
    profiles:
      - timestamp-operator

  hub:
    image: ${DISTR_IMAGE_REF:?set DISTR_IMAGE_REF in .env}
    command: ['serve', '--migrate=false']
    env_file:
      - ${DISTR_COMPOSE_ENV_FILE:?deploy.sh supplies the absolute env file}
    environment:
      PGAPPNAME: distr-hub
    depends_on:
      postgres:
        condition: service_healthy
      storage:
        condition: service_healthy
    ports:
      - '127.0.0.1:${DISTR_HTTP_PORT:-8080}:8080'
      - '127.0.0.1:${DISTR_REGISTRY_PORT:-8585}:8585'
    networks:
      default:
      nginx-ui:
        aliases:
          - distr-hub
    restart: unless-stopped
    stop_grace_period: 45s

  artifact-blob-cleanup:
    image: ${DISTR_IMAGE_REF:?set DISTR_IMAGE_REF in .env}
    command: ['cleanup', 'ArtifactBlob', '--timeout', '10m']
    env_file:
      - ${DISTR_COMPOSE_ENV_FILE:?deploy.sh supplies the absolute env file}
    depends_on:
      postgres:
        condition: service_healthy
      storage:
        condition: service_healthy
    profiles:
      - cleanup

volumes:
  postgres:
  rustfs:

networks:
  nginx-ui:
    external: true
    name: ${NGINX_UI_NETWORK:-services}
