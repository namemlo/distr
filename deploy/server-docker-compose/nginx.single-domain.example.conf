# Single-domain reverse proxy example for Nginx UI.
# Use this shape when Hub and registry share one public hostname.
#
# Public hostname:
#   distr.emlotech.com
#
# Backends on the Docker host:
#   http://distr-hub:8080 -> Hub UI/API
#   http://distr-hub:8585 -> OCI registry /v2/
#
# The Distr Hub container must join the same Docker network as nginx-ui with
# alias `distr-hub`; docker-compose.yml does this through NGINX_UI_NETWORK.

server {
    listen 443 ssl http2;
    server_name distr.emlotech.com;

    ssl_certificate /etc/letsencrypt/live/distr.emlotech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/distr.emlotech.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 5g;
    proxy_read_timeout 900s;
    proxy_send_timeout 900s;

    location /v2/ {
        proxy_pass http://distr-hub:8585;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://distr-hub:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
