# Port 80 reverse proxy example for Nginx UI.
# Use this before adding your own HTTPS/443 config.
#
# Public hostname:
#   distr.emlotech.com
#
# Backends on the shared Docker network:
#   http://distr-hub:8080 -> Hub UI/API
#   http://distr-hub:8585 -> OCI registry /v2/

server {
    listen 80;
    server_name distr.emlotech.com;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $distr_hub_ui http://distr-hub:8080;
    set $distr_hub_registry http://distr-hub:8585;

    client_max_body_size 5g;
    proxy_read_timeout 900s;
    proxy_send_timeout 900s;

    location /v2/ {
        proxy_pass $distr_hub_registry;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass $distr_hub_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
