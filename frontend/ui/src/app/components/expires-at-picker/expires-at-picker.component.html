<input type="date" [id]="inputId()" [formControl]="control" class="distr-input disabled:opacity-60" />
<div class="flex flex-wrap gap-2 mt-2">
  @for (preset of presets; track preset.label) {
    @let date = presetDate(preset);
    <button
      type="button"
      [disabled]="control.disabled"
      (click)="control.setValue(date)"
      class="text-gray-900 hover:border-primary-600 focus:ring-4 focus:outline-none focus:ring-primary-300 leading-5 rounded-lg text-xs px-3 py-0.5 transition-colors disabled:opacity-60 dark:text-white dark:hover:border-primary-500 dark:focus:ring-primary-800"
      [class]="
        control.value === date
          ? 'border-2 border-primary-600 font-semibold dark:border-primary-500'
          : 'border border-gray-300 font-medium dark:border-gray-600'
      ">
      {{ preset.label }}
    </button>
  }
  @if (allowNoExpiration()) {
    <button
      type="button"
      [disabled]="control.disabled"
      (click)="control.setValue('')"
      class="text-gray-900 hover:border-primary-600 focus:ring-4 focus:outline-none focus:ring-primary-300 leading-5 rounded-lg text-xs px-3 py-0.5 transition-colors disabled:opacity-60 dark:text-white dark:hover:border-primary-500 dark:focus:ring-primary-800"
      [class]="
        control.value === ''
          ? 'border-2 border-primary-600 font-semibold dark:border-primary-500'
          : 'border border-gray-300 font-medium dark:border-gray-600'
      ">
      Never
    </button>
  }
</div>
